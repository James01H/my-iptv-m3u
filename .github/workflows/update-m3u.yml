name: Update M3U

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update playlist
        run: python update_m3u.py

      - name: Commit updated playlist
        run: |
          if git diff --quiet -- output/index.m3u; then
            echo "No playlist changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/index.m3u
          git commit -m "Update M3U playlist"
          git push
